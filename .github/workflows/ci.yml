name: SubVision CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Linter
        working-directory: ./frontend
        run: npm run lint

      - name: Typecheck
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build Test
        working-directory: ./frontend
        run: npm run build

  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dev Dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run Ruff Linter
        run: ruff check ./backend

  docker-build-verify:
    needs:
      - frontend-checks
      - backend-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify API Image Build
        uses: docker/build-push-action@v5
        with:
          context: .
          target: api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Worker Image Build
        uses: docker/build-push-action@v5
        with:
          context: .
          target: worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
