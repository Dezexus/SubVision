[tool.ruff]
line-length = 200
target-version = "py310"
exclude = [
    ".git",
    "__pycache__",
    "venv",
    ".venv",
    "env",
    "build",
    "dist"
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "B"
]
ignore = [
    "B008",
    "B904",
    "B007",
    "F401"
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
