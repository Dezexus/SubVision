services:
  redis:
    image: redis:7-alpine
    container_name: subvision_redis
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

  subvision:
    build:
      context: .
      target: api
    container_name: subvision_api
    restart: unless-stopped
    ports:
      - "7860:7860"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/backend/uploads
    environment:
      - REDIS_URL=redis://redis:6379/0

  worker:
    build:
      context: .
      target: worker
    container_name: subvision_worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - paddle_models:/root/.paddleocr
      - paddlex_cache:/root/.paddlex
    environment:
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
      - FLAGS_fraction_of_gpu_memory_to_use=0.9
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [compute, utility, video]
    shm_size: '8gb'

volumes:
  paddle_models:
  paddlex_cache: